name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: ruff lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install ruff
      - run: python -m ruff check .

  test:
    name: pytest (${{ matrix.os }} / Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # python-vlc is a thin binding and ``import vlc`` requires the libVLC
      # shared library at import time. On Linux runners the package needs to
      # be installed explicitly; macOS / Windows runners come without VLC,
      # so we install the official binaries via apt / brew / choco.
      - name: Install VLC (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends vlc libvlc-bin libxcb-cursor0

      - name: Install VLC (macOS)
        if: runner.os == 'macOS'
        run: brew install --cask vlc

      - name: Install VLC (Windows)
        if: runner.os == 'Windows'
        run: choco install vlc --no-progress -y

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          # Editable install pulls in ``[project] dependencies`` from
          # pyproject.toml together with the dev extras (pytest, pyinstaller).
          python -m pip install -e .[dev]

      - name: Run pytest
        env:
          # Headless Qt: ``QT_QPA_PLATFORM=offscreen`` avoids needing an X11
          # display on Linux runners while still letting QObject-based
          # models / signal-slot wiring work normally.
          QT_QPA_PLATFORM: offscreen
        # Skip the performance benchmarks (``tests/test_perf.py``) on CI;
        # they are useful locally for tracking regressions but slow CI down
        # and depend on hardware characteristics of the runners.
        run: python -m pytest tests/ -v --benchmark-skip
